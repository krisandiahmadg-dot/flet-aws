<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Aplikasi Flet Saya">

  <link rel="icon" type="image/png" href="assets/favicon.png"/>

  <title>ERP by krisandi.ahmadg@gmail.com</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Mengatur tampilan loading screen */
    body {
      background-color: #212121; /* Warna background saat loading */
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      font-family: sans-serif;
    }

    .loading-container {
      text-align: center;
    }

    /* Animasi Logo */
    .logo {
      width: 120px; /* Ukuran logo */
      height: auto;
      margin-bottom: 20px;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }

    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    p { color: white; margin-top: 15px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="loading-container">
    <img class="logo" src="assets/logo.png" alt="Loading...">
    <div class="loader"></div>
    <p>Mohon tunggu sebentar...</p>
  </div>

  <script src="main.dart.js" type="application/javascript"></script>
</body>
</html>
